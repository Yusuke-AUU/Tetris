<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:180px; height:180px; overflow:hidden; background:#040812; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
  .fl { animation: blink 0.6s ease-in-out infinite; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 40px;
    overflow: hidden;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 48px);
    grid-template-rows: repeat(4, 38px);
    gap: 5px;
    padding: 10px;
  }

  .cell {
    border-radius: 8px;
    position: relative;
    overflow: hidden;
  }
  .cell::after {
    content: '';
    position: absolute;
    top: 4px; left: 4px;
    width: 16px; height: 6px;
    background: rgba(255,255,255,0.28);
    border-radius: 2px;
  }

  .cyan   { background:#00e5ff; box-shadow:0 0 10px rgba(0,229,255,0.8); }
  .purple { background:#bf5fff; box-shadow:0 0 10px rgba(191,95,255,0.8); }
  .pink   { background:#ff2d78; box-shadow:0 0 10px rgba(255,45,120,0.8); }
  .white  { background:#ffffff; box-shadow:0 0 16px rgba(255,255,255,1); }
  .empty  { background:rgba(0,229,255,0.06); border:1px solid rgba(0,229,255,0.12); }
</style>
</head>
<body>
<div class="board">
  <!-- Row1: cyan -->
  <div class="cell cyan"></div>
  <div class="cell cyan"></div>
  <div class="cell cyan"></div>
  <!-- Row2: purple T -->
  <div class="cell empty"></div>
  <div class="cell purple"></div>
  <div class="cell empty"></div>
  <!-- Row3: purple -->
  <div class="cell purple"></div>
  <div class="cell purple"></div>
  <div class="cell pink"></div>
  <!-- Row4: white flash (full line) -->
  <div class="cell white fl"></div>
  <div class="cell white fl"></div>
  <div class="cell white fl"></div>
</div>
</body>
</html>
